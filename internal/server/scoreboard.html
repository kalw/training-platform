<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>training-platform — challenges &amp; results</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1117; --panel:#171a23; --fg:#e6e8ee; --muted:#9aa3b2; --accent:#4f8cff; --ok:#31c48d; --border:#262b38; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:16px 24px; border-bottom:1px solid var(--border); }
  header h1 { font-size:16px; margin:0; }
  header a { color:var(--accent); text-decoration:none; font-size:13px; }
  main { max-width:1000px; margin:0 auto; padding:24px; display:grid; gap:24px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0; padding:12px 16px; border-bottom:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th,td { text-align:left; padding:9px 16px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
  tr:last-child td { border-bottom:0; }
  code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:var(--muted); }
  .badge { display:inline-block; background:rgba(79,140,255,.15); color:var(--accent); border-radius:20px; padding:1px 8px; font-size:12px; }
  .empty { color:var(--muted); padding:16px; }
  .user { color:var(--ok); font-weight:600; }
</style>
</head>
<body>
<header>
  <h1>Challenges &amp; results</h1>
  <a href="/">← back to lessons</a>
</header>
<main>
  <section class="card">
    <h2>Challenges</h2>
    <table><thead><tr><th>Name</th><th>Points</th><th>Hash</th></tr></thead>
    <tbody id="challenges"><tr><td class="empty" colspan="3">loading…</td></tr></tbody></table>
  </section>
  <section class="card">
    <h2>Results (recorded solves)</h2>
    <table><thead><tr><th>User</th><th>Challenge</th><th>Points</th></tr></thead>
    <tbody id="results"><tr><td class="empty" colspan="3">loading…</td></tr></tbody></table>
  </section>
</main>
<script>
async function load(){
  const ce=document.getElementById('challenges'), re=document.getElementById('results');
  try {
    const cj=await (await fetch('/api/v1/challenges')).json();
    const cs=(cj.data||[]);
    ce.innerHTML = cs.length ? cs.map(c=>
      `<tr><td><span class="badge">${esc(c.name)}</span></td><td>${c.value}</td><td><code>${esc(c.hash.slice(0,16))}…</code></td></tr>`
    ).join('') : '<tr><td class="empty" colspan="3">no challenges seeded</td></tr>';

    const rj=await (await fetch('/api/v1/scoreboard')).json();
    const rs=(rj.data||[]);
    re.innerHTML = rs.length ? rs.map(s=>
      `<tr><td class="user">${esc(s.user)}</td><td>${esc(s.challenge_name)}</td><td>${s.value}</td></tr>`
    ).join('') : '<tr><td class="empty" colspan="3">no solves yet</td></tr>';
  } catch(e){ ce.innerHTML='<tr><td class="empty" colspan="3">error: '+esc(String(e))+'</td></tr>'; }
}
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
load();
setInterval(load, 4000);
</script>
</body>
</html>
