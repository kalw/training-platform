name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      - run: go test ./... -race -count=1
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi

  # Cross-compile every OS/arch and upload the binaries. Proves the whole
  # tree builds for each target (pure Go, no cgo) on every push/PR.
  build-matrix:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
          - {goos: darwin, goarch: amd64}
          - {goos: darwin, goarch: arm64}
          - {goos: windows, goarch: amd64}
          - {goos: windows, goarch: arm64}
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-go@v5
        with: {go-version: "1.25", cache: true}
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty)
          ext=""; [ "$GOOS" = "windows" ] && ext=".exe"
          out="training_${GOOS}_${GOARCH}${ext}"
          go build -ldflags "-s -w -X github.com/kalw/training-platform/internal/version.Version=${VERSION}" \
            -o "dist/${out}" ./cmd/training
      - uses: actions/upload-artifact@v4
        with:
          name: training-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # Multi-arch container image. Pushes to GHCR only on main/tags (not PRs).
  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kalw/training-platform
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  # Attach cross-compiled binaries to GitHub Releases on tags.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-matrix, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-go@v5
        with: {go-version: "1.25", cache: true}
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
