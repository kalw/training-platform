name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

# Never cut two releases at once (a second push while one is tagging would
# race on the tag).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      - run: go test ./... -race -count=1
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
      - name: vendored assets match the npm lockfile
        # `make assets` re-copies the dist files from the lockfile-pinned npm
        # packages; any diff means the committed files drifted from the pins.
        # (Renovate bumps only the pins — the assets-sync workflow pushes the
        # regenerated files onto its PR; this step is the enforcement.)
        run: |
          make assets
          git diff --exit-code internal/content/assets

  # Cross-compile every OS/arch and upload the binaries. Proves the whole
  # tree builds for each target (pure Go, no cgo) on every push/PR.
  build-matrix:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
          - {goos: darwin, goarch: amd64}
          - {goos: darwin, goarch: arm64}
          - {goos: windows, goarch: amd64}
          - {goos: windows, goarch: arm64}
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-go@v5
        with: {go-version: "1.25", cache: true}
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty)
          ext=""; [ "$GOOS" = "windows" ] && ext=".exe"
          out="training_${GOOS}_${GOARCH}${ext}"
          go build -ldflags "-s -w -X github.com/kalw/training-platform/internal/version.Version=${VERSION}" \
            -o "dist/${out}" ./cmd/training
      - uses: actions/upload-artifact@v4
        with:
          name: training-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # Playwright end-to-end: UI, scoring, forged API calls and the scoreboard,
  # run fully self-contained in Docker (no local Node/Chrome, no cluster —
  # the terminal spec is cluster-gated and skips here).
  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build e2e image
        run: docker build -f e2e/Dockerfile -t training-e2e .
      - name: run e2e
        run: docker run --rm training-e2e

  # Multi-arch container image. Pushes to GHCR only on main/tags (not PRs).
  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kalw/training-platform
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  # The Helm chart is validated on every push/PR. Publishing happens in the
  # release job, which owns the version being cut.
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: azure/setup-helm@v4
        with: {version: v3.16.3}

      - name: Lint
        run: helm lint deploy/helm/training-platform

      # Render under several value permutations: a bad template only shows up
      # on the path that uses it (ingress, persistence, auth, the dev values).
      - name: Template (default)
        run: helm template t deploy/helm/training-platform > /dev/null
      - name: Template (ingress + persistence + router)
        run: |
          helm template t deploy/helm/training-platform \
            --set ingress.enabled=true --set ingress.host=training.example.com \
            --set persistence.enabled=true \
            --set serve.routerHost=direct.training.example.com \
            --set serve.salt=ci > /dev/null
      - name: Template (dev values)
        run: helm template t deploy/helm/training-platform -f deploy/helm/dev-values.yaml > /dev/null
      # --strict promotes lint warnings to failures; `helm template` above
      # already fails on YAML that doesn't parse.
      - name: Lint (strict)
        run: helm lint --strict deploy/helm/training-platform

  # Cut a release. Two ways in:
  #
  #   * push to main  -> derive the next semver from the Conventional Commits
  #                      since the last tag, create it, and publish
  #   * push a v* tag -> publish exactly that tag (manual / seed releases)
  #
  # Docs/chore/ci-only pushes produce no release (default_bump: false).
  #
  # Everything is published from THIS job rather than from tag-triggered ones,
  # because a tag pushed with GITHUB_TOKEN does not trigger workflows — a
  # tag-gated publish would silently never run for auto-cut releases, and the
  # chart's appVersion would point at an image tag that was never pushed.
  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [test, build-matrix, e2e, image, chart]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: azure/setup-helm@v4
        with: {version: v3.16.3}

      - name: Compute next version (Conventional Commits)
        id: next
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: false
          dry_run: true   # compute only; we push a lightweight tag ourselves

      - name: Resolve the version being released
        id: v
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ steps.next.outputs.new_tag }}"
          fi
          if [ -z "$tag" ]; then
            echo "no release-worthy commits since the last tag"
          else
            echo "tag=$tag"          >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}"  >> "$GITHUB_OUTPUT"
          fi

      # A lightweight tag on HEAD: GoReleaser requires the current tag to point
      # at the commit being built, which the action's annotated tag would not.
      - name: Create and push the tag
        if: github.ref == 'refs/heads/main' && steps.v.outputs.tag != ''
        run: |
          git tag "${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"

      # Retag the multi-arch image the image job already pushed, by digest —
      # no rebuild, and it is provably the same artifact CI tested.
      - name: Tag the image with the release version
        if: steps.v.outputs.tag != ''
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker buildx imagetools create \
            -t "ghcr.io/kalw/training-platform:${{ steps.v.outputs.version }}" \
            -t "ghcr.io/kalw/training-platform:latest" \
            "ghcr.io/kalw/training-platform@${{ needs.image.outputs.digest }}"

      # Chart version == release version; its appVersion pins the image tag
      # created just above.
      - name: Package and push the Helm chart
        if: steps.v.outputs.tag != ''
        run: |
          helm package deploy/helm/training-platform \
            --version "${{ steps.v.outputs.version }}" \
            --app-version "${{ steps.v.outputs.version }}" \
            --destination /tmp/chart
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push "/tmp/chart/training-platform-${{ steps.v.outputs.version }}.tgz" \
            oci://ghcr.io/kalw/charts

      - uses: actions/setup-go@v5
        if: steps.v.outputs.tag != ''
        with: {go-version: "1.25", cache: true}
      - uses: goreleaser/goreleaser-action@v6
        if: steps.v.outputs.tag != ''
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.v.outputs.tag }}
