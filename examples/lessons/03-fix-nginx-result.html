<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Exercise result</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1117;
      color: #e6e8ee
    }

    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px
    }

    .banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: #141822
    }

    .check {
      width: 180px;
      height: 150px;
      border-radius: 16px;
      background: #31c48d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      color: #0f1117
    }

    h1 {
      font-size: 28px;
      margin: 0
    }

    p {
      color: #9aa3b2;
      margin: 0
    }
  </style>
</head>

<body>
  <div class="banner"></div>
  <div class="wrap">
    <div class="check">✓</div>
    <h1>Success is a state of mind</h1>
    <p>The service is running correctly.</p>
  </div>

  <!-- Exercise proof loader. A real exercise image inherits this from
       training-exercises-template; the example bakes it in so the demo works
       end-to-end. When the page is opened via the lesson's "Test Exercise"
       button (which appends ?hash_code=…&lessonsDomain=…), it pulls
       exercise-verify.js from the lessons origin, which screenshots this page
       and submits the capture to the scoring API. Opened directly (no params)
       it's inert — a plain result page. -->
  <script>
    (function () {
      var d = new URLSearchParams(location.search).get('lessonsDomain');
      if (!d) return;
      var s = document.createElement('script');
      s.src = d.replace(/\/+$/, '') + '/js/exercise-verify.js';
      document.head.appendChild(s);
    })();
  </script>
</body>

</html>
