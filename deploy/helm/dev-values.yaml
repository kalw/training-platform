# Values for the local dev loop (`make dev-deploy` on a kind/k3s cluster):
# locally-built image, lessons served from the `lessons` ConfigMap that
# `make dev-lessons` (re)creates, plain-HTTP-friendly auth cookies, short
# idle TTL so abandoned session Pods disappear quickly while iterating.
image:
  repository: training-platform
  tag: dev
  pullPolicy: IfNotPresent

# Exercise the durable solve log locally — kind's default storage class
# provisions this, and solves then survive `make dev-deploy` rollouts.
persistence:
  enabled: true
  size: 128Mi

serve:
  lessonsDir: /lessons
  salt: demo-salt
  sessionIdleTTL: "5m"
  # Exposed-port links through `make dev-forward` (localhost:8080):
  # *.direct.127.0.0.1.sslip.io resolves to 127.0.0.1 (public wildcard DNS),
  # the port-forward carries the request to the platform, and the in-serve
  # router proxies to the Pod IP encoded in the hostname. Needs internet DNS.
  routerHost: "direct.127.0.0.1.sslip.io:8080"

challengesFile: /lessons/challenges.json

auth:
  cookieSecure: false

extraVolumes:
  - name: lessons
    configMap:
      name: lessons
extraVolumeMounts:
  - name: lessons
    mountPath: /lessons
    readOnly: true
