# Default values for training-platform.

image:
  repository: ghcr.io/kalw/training-platform
  tag: ""            # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicaCount: 1

# Namespace where learner session Pods (and the Docker-shim's containers)
# are created. The platform's ServiceAccount is granted rights over Pods
# and pods/exec here. Sessions are labelled and GC'd by TTL.
sessionNamespace: training-sessions

# Command-line flags for `training serve` (see cmd/training/main.go).
serve:
  lessonsDir: ""                                   # empty serves a placeholder; mount built lessons here
  sessionNamespacePrefix: "session-"
  sessionTTL: "4h"                                 # hard cap on session lifetime
  sessionIdleTTL: "10m"                            # pods are reaped this long after the page stops pinging (closed/hidden tab)
  instanceImage: "ghcr.io/kalw/training-console-pwd:dind"
  enableShim: true                                 # keep Docker-in-course working
  salt: ""                                         # scoring salt; must match the lessons build
  baseURL: ""                                      # external origin, for social-login redirect URLs
  routerHost: ""                                   # public suffix for exposed-port links (e.g. direct.training.example.com); usually matches ingress.wildcardHost

# Social login (GitHub / Google OAuth2). A provider turns on when its
# client id + secret are both set. Leave all empty for anonymous mode.
auth:
  secret: ""                                       # signs session cookies; keep stable across replicas
  cookieSecure: true                               # set false only for plain-HTTP local testing
  github:
    clientID: ""
    clientSecret: ""
  google:
    clientID: ""
    clientSecret: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: training.example.com
  tls: false
  # The exposed-port router needs a wildcard host (*.direct.<domain>) to
  # reach session instances; enable and point it at the same Service.
  wildcardHost: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

# Extra volumes / mounts on the platform Pod — e.g. mount a ConfigMap of a
# built lesson site at serve.lessonsDir, and/or a challenges file.
extraVolumes: []
extraVolumeMounts: []

# Path to a JSON challenges file (mounted via extraVolumes) to seed scoring.
challengesFile: ""

# Durable solves. Solves are the only state that cannot be recomputed
# (challenges are re-seeded from the build at every boot), so persistence is a
# small PVC holding an append-only JSON-lines log — no database to run.
#
# Disabled = solves live in memory and are LOST on restart, which is fine for
# CI and content authoring but not for a real class.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""          # "" = cluster default
  existingClaim: ""         # bring your own PVC instead of creating one
  mountPath: /data
  fileName: solves.jsonl
  keepOnUninstall: true     # helm.sh/resource-policy: keep — don't bin learner progress

# The session Pods this platform creates need to run privileged (nested
# dockerd for "play with docker"). Pod Security is scoped to the session
# namespace only, never cluster-wide.
sessionPodSecurity:
  enforce: privileged

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
