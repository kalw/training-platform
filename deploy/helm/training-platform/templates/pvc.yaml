{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
# Solve log. Solves are the only state the platform cannot recompute —
# challenges are re-seeded from the build's challenges.json at every boot —
# so this claim is small and holds an append-only JSON-lines file, not a
# database. ReadWriteOnce is deliberate: the log has a single writer.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "training-platform.fullname" . }}-solves
  labels:
    {{- include "training-platform.labels" . | nindent 4 }}
  {{- if .Values.persistence.keepOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
